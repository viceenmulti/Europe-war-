<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Victoria</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial;
}

#inicio {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

#startBtn {
    width: 320px;
    height: 120px;
    cursor: pointer;
}

#juego {
    display: none;
}

#mapa {
    width: 100vw;
    height: 100vh;
    background: #222;
}

#diplomacia {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #333;
    color: white;
    padding: 15px;
}

/* TOPBAR */
#topbar {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background: #222;
    color: white;
    padding: 5px;
    align-items: center;
    gap: 10px;
}

#bandera {
    width: 60px;
    height: 40px;
    object-fit: cover;
}

#topbar button {
    padding: 8px;
    cursor: pointer;
}

/* POPUP */
#popup {
    display: none;
    position: absolute;
    top: 40%;
    left: 40%;
    background: #222;
    color: white;
    padding: 20px;
    border: 2px solid white;
}

/* MENSAJE INICIAL */
#mensaje {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: white;
    padding: 10px;
}
</style>
</head>

<body>

<div id="inicio">
    <img src="start.jpg" id="startBtn" onclick="iniciarJuego()">
</div>

<div id="juego">

    <div id="mensaje">Haz click en un país para empezar</div>

    <div id="topbar">
        <img id="bandera" src="">
        <button>Economía</button>
        <button>Fábricas</button>
        <button>Ejército</button>
    </div>

    <object id="mapa" type="image/svg+xml" data="europe.svg"></object>

    <div id="diplomacia">
        Diplomacy (coming soon)
    </div>

</div>

<div id="popup">
    <p>Declare war?</p>
    <button onclick="cerrarPopup()">Close</button>
</div>

<script>
let miPais = null;
let svgDoc = null;

const nombresPaises = {
    ES: "españa",
    FR: "francia",
    DE: "alemania",
    IT: "italia",
    PL: "polonia",
    GB: "reino_unido",
    UA: "ucrania",
    TR: "turquia"
};

function iniciarJuego() {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("juego").style.display = "block";
}

document.getElementById("mapa").addEventListener("load", function() {
    svgDoc = this.contentDocument;

    const paises = svgDoc.querySelectorAll("path");

    paises.forEach(pais => {
        pais.addEventListener("click", function() {

            // 🟢 PRIMER CLICK → elegir país
            if (!miPais) {
                elegirPais(this.id);
                return;
            }

            // 🟢 después → popup guerra
            if (this.id !== miPais) {
                abrirPopup();
            }

        });
    });
});

function elegirPais(id) {
    miPais = id;

    // ocultar mensaje inicial
    document.getElementById("mensaje").style.display = "none";

    // mostrar topbar
    document.getElementById("topbar").style.display = "flex";

    // bandera
    const nombre = nombresPaises[id];
    if (nombre) {
        document.getElementById("bandera").src = nombre + ".jpg";
    }

    console.log("Elegiste:", id);
}

function abrirPopup() {
    document.getElementById("popup").style.display = "block";
}

function cerrarPopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
