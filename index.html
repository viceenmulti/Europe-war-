<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Victoria</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial;
}

/* PANTALLA INICIO */
#inicio {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOTON START */
#startBtn {
    width: 320px;
    height: 120px;
    cursor: pointer;
}

/* CONTENEDOR JUEGO */
#juego {
    display: none;
}

/* MAPA */
#mapa {
    width: 100vw;
    height: 100vh;
    background: #222;
}

/* MENU PAISES */
#menu {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #222;
    color: white;
    padding: 10px;
    max-height: 80vh;
    overflow-y: auto;
}

/* DIPLOMACIA */
#diplomacia {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #333;
    color: white;
    padding: 15px;
}

/* VENTANA GUERRA */
#popup {
    display: none;
    position: absolute;
    top: 40%;
    left: 40%;
    background: #222;
    color: white;
    padding: 20px;
    border: 2px solid white;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
    <img src="start.jpg" id="startBtn" onclick="iniciarJuego()">
</div>

<!-- JUEGO -->
<div id="juego">

    <object id="mapa" type="image/svg+xml" data="europe.svg"></object>

    <div id="menu">
        <h3>Choose Country</h3>

        <button onclick="elegirPais('ES')">Spain</button>
        <button onclick="elegirPais('FR')">France</button>
        <button onclick="elegirPais('DE')">Germany</button>
        <button onclick="elegirPais('IT')">Italy</button>
        <button onclick="elegirPais('PL')">Poland</button>
        <button onclick="elegirPais('GB')">UK</button>
        <button onclick="elegirPais('UA')">Ukraine</button>
        <button onclick="elegirPais('TR')">Turkey</button>
    </div>

    <div id="diplomacia">
        Diplomacy (coming soon)
    </div>

</div>

<!-- POPUP GUERRA -->
<div id="popup">
    <p>Declare war?</p>
    <button onclick="cerrarPopup()">Close</button>
</div>

<script>
let miPais = null;
let svgDoc = null;

// INICIAR
function iniciarJuego() {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("juego").style.display = "block";
}

// CARGA SVG
document.getElementById("mapa").addEventListener("load", function() {
    svgDoc = this.contentDocument;

    const paises = svgDoc.querySelectorAll("path");

    paises.forEach(pais => {
        pais.addEventListener("click", function() {

            if (!miPais) return;

            // si clickeás otro país → popup
            if (this.id !== miPais) {
                abrirPopup();
            }

        });
    });
});

// ELEGIR PAIS
function elegirPais(id) {
    miPais = id;

    console.log("Elegiste:", id);
}

// POPUP
function abrirPopup() {
    document.getElementById("popup").style.display = "block";
}

function cerrarPopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
