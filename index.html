<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Victoria</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial;
}

#inicio {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

#startBtn {
    width: 320px;
    height: 120px;
    cursor: pointer;
}

#juego {
    display: none;
}

#mapa {
    width: 100vw;
    height: 100vh;
    background: #222;
}

#diplomacia {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #333;
    color: white;
    padding: 15px;
}

#topbar {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background: #222;
    color: white;
    padding: 5px;
    align-items: center;
    gap: 10px;
}

#bandera {
    width: 60px;
    height: 40px;
    object-fit: cover;
}

#topbar button {
    padding: 8px;
    cursor: pointer;
}

#popup {
    display: none;
    position: absolute;
    top: 40%;
    left: 40%;
    background: #222;
    color: white;
    padding: 20px;
    border: 2px solid white;
}

#mensaje {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: white;
    padding: 10px;
}

#ejercitoPanel {
    display: none;
    position: absolute;
    top: 20%;
    left: 35%;
    background: #222;
    color: white;
    padding: 20px;
    border: 2px solid white;
}

/* 🟡 EJÉRCITO VISUAL */
#ejercitoImg {
    display: none;
    position: absolute;
    width: 40px;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="inicio">
    <img src="start.jpg" id="startBtn" onclick="iniciarJuego()">
</div>

<div id="juego">

    <div id="mensaje">Haz click en un país para empezar</div>

    <div id="topbar">
        <img id="bandera" src="">
        <button>Economía</button>
        <button>Fábricas</button>
        <button onclick="abrirEjercito()">Ejército</button>
    </div>

    <!-- 🟡 EJÉRCITO -->
    <img id="ejercitoImg" src="army.png">

    <object id="mapa" type="image/svg+xml" data="europe.svg"></object>

    <div id="diplomacia">
        Diplomacy (coming soon)
    </div>

</div>

<div id="popup"></div>

<div id="ejercitoPanel">
    <h3>Army Setup</h3>

    <p>Infantería: <span id="inf">0</span> / 4</p>
    <button onclick="sumar('inf',4)">+</button>

    <p>Artillería: <span id="art">0</span> / 2</p>
    <button onclick="sumar('art',2)">+</button>

    <p>Tanques: <span id="tan">0</span> / 2</p>
    <button onclick="sumar('tan',2)">+</button>

    <p>Ingeniero: <span id="ing">0</span> / 1</p>
    <button onclick="sumar('ing',1)">+</button>

    <br><br>
    <button onclick="cerrarEjercito()">Cerrar</button>
</div>

<script>
let miPais = null;
let svgDoc = null;

let ejercitoData = { inf:0, art:0, tan:0, ing:0 };

const nombresPaises = {
    ES: "españa",
    FR: "francia",
    DE: "alemania",
    IT: "italia",
    PL: "polonia",
    GB: "reino_unido",
    UA: "ucrania",
    TR: "turquia"
};

function iniciarJuego() {
    inicio.style.display = "none";
    juego.style.display = "block";
}

document.getElementById("mapa").addEventListener("load", function() {
    svgDoc = this.contentDocument;

    const paises = svgDoc.querySelectorAll("path");

    paises.forEach(pais => {
        pais.addEventListener("click", function(evt) {

            if (!miPais) {
                elegirPais(this.id);
                return;
            }

            // 🟢 mover ejército dentro de tu país
            if (this.id === miPais) {
                moverEjercito(evt);
            }

            // combate
            if (this.id !== miPais) {
                abrirPopup();
            }
        });
    });
});

function elegirPais(id) {
    miPais = id;

    mensaje.style.display = "none";
    topbar.style.display = "flex";

    const nombre = nombresPaises[id];
    if (nombre) {
        bandera.src = nombre + ".jpg";
    }

function crearEjercito() {

    if (!miPais) return;

    const pais = svgDoc.getElementById(miPais);
    const bbox = pais.getBBox();

    const x = bbox.x + bbox.width / 2;
    const y = bbox.y + bbox.height / 2;

    const pt = svgDoc.documentElement.createSVGPoint();
    pt.x = x;
    pt.y = y;

    const screen = pt.matrixTransform(svgDoc.documentElement.getScreenCTM());

    const img = document.getElementById("ejercitoImg");

    img.style.left = screen.x + "px";
    img.style.top = screen.y + "px";
    img.style.display = "block";

    // cerrar panel automáticamente
    ejercitoPanel.style.display = "none";
}

function moverEjercito(evt) {
    const pt = svgDoc.documentElement.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;

    const svgP = pt.matrixTransform(svgDoc.documentElement.getScreenCTM().inverse());
    const screen = svgP.matrixTransform(svgDoc.documentElement.getScreenCTM());

    const img = document.getElementById("ejercitoImg");
    img.style.left = screen.x + "px";
    img.style.top = screen.y + "px";
}

// ===== EJÉRCITO PANEL =====
function abrirEjercito() {
    ejercitoPanel.style.display = "block";
}

function cerrarEjercito() {
    ejercitoPanel.style.display = "none";
}

function sumar(tipo, max) {
    if (ejercitoData[tipo] < max) {
        ejercitoData[tipo]++;
        document.getElementById(tipo).innerText = ejercitoData[tipo];
    }
}

// ===== COMBATE =====
function calcularFuerza(ej) {
    let base = ej.inf*1 + ej.art*4 + ej.tan*5;
    if (ej.ing > 0) base *= 1.2;
    return Math.floor(base);
}

function generarEnemigo() {
    return {
        inf: Math.floor(Math.random()*5),
        art: Math.floor(Math.random()*3),
        tan: Math.floor(Math.random()*3),
        ing: Math.floor(Math.random()*2)
    };
}

function abrirPopup() {
    let enemigo = generarEnemigo();

    let fJugador = calcularFuerza(ejercitoData);
    let fEnemigo = calcularFuerza(enemigo);

    let resultado = fJugador > fEnemigo ? "Ganaste 😎"
                   : fJugador < fEnemigo ? "Perdiste 💀"
                   : "Empate 🤝";

    popup.innerHTML = `
        <p>Batalla</p>
        <p>Tu fuerza: ${fJugador}</p>
        <p>Enemigo: ${fEnemigo}</p>
        <p>${resultado}</p>
        <button onclick="cerrarPopup()">Cerrar</button>
    `;

    popup.style.display = "block";
}

function cerrarPopup() {
    popup.style.display = "none";
}
</script>

</body>
</html>
