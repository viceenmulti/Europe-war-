<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Victoria</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial;
}

/* PANTALLA INICIO */
#inicio {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOTON START */
#startBtn {
    width: 320px;
    height: 120px;
    cursor: pointer;
}

/* CONTENEDOR JUEGO */
#juego {
    display: none;
}

/* MAPA */
#mapa {
    width: 100vw;
    height: 100vh;
    background: #222;
}

/* MENU PAISES */
#menu {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #222;
    color: white;
    padding: 10px;
    max-height: 80vh;
    overflow-y: auto;
}

/* DIPLOMACIA (placeholder) */
#diplomacia {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #333;
    color: white;
    padding: 15px;
}
</style>
</head>

<body>

<!-- PANTALLA INICIO -->
<div id="inicio">
    <img src="start.png" id="startBtn" onclick="iniciarJuego()">
</div>

<!-- JUEGO -->
<div id="juego">

    <!-- MAPA SVG -->
    <object id="mapa" type="image/svg+xml" data="europe.svg"></object>

    <!-- MENU -->
    <div id="menu">
        <h3>Choose Country</h3>

        <button onclick="elegirPais('ES')">Spain</button>
        <button onclick="elegirPais('FR')">France</button>
        <button onclick="elegirPais('DE')">Germany</button>
        <button onclick="elegirPais('IT')">Italy</button>
        <button onclick="elegirPais('PL')">Poland</button>
        <button onclick="elegirPais('GB')">UK</button>
        <button onclick="elegirPais('UA')">Ukraine</button>
        <button onclick="elegirPais('TR')">Turkey</button>

    </div>

    <!-- DIPLOMACIA -->
    <div id="diplomacia">
        Diplomacy (coming soon)
    </div>

</div>

<script>
let miPais = null;
let svgDoc = null;

// INICIAR JUEGO
function iniciarJuego() {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("juego").style.display = "block";
}

// CUANDO CARGA EL SVG
document.getElementById("mapa").addEventListener("load", function() {
    svgDoc = this.contentDocument;

    // activar clicks en países
    const paises = svgDoc.querySelectorAll("path");

    paises.forEach(pais => {
        pais.addEventListener("click", function() {
            if (miPais) {
                this.style.fill = "red"; // conquistar
            }
        });
    });
});

// ELEGIR PAIS
function elegirPais(id) {
    miPais = id;

    const pais = svgDoc.getElementById(id);
    if (pais) {
        pais.style.fill = "blue";
    }

    console.log("Elegiste:", id);
}
</script>

</body>
</html>
